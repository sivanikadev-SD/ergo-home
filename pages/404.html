<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function(){
      var t=localStorage.getItem('ergohome-theme');
      document.documentElement.setAttribute('data-theme', t || 'dark');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | ErgoHome</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/premium-theme.css">
  <link rel="stylesheet" href="../assets/css/mobile-fixes.css">
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:var(--sp-8);background:radial-gradient(ellipse 70% 50% at 50% 30%,var(--color-primary-50),transparent 70%)}
    .error-number{font-size:clamp(6rem,20vw,12rem);font-weight:900;font-family:var(--font-display);line-height:1;background:var(--brand-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--sp-4);animation:pulse 3s ease-in-out infinite}
  </style>
</head>
<body>
<nav class="nav"><div class="nav__inner"><a href="../index.html" class="nav__logo"><div class="nav__logo-icon"><i class="ri-armchair-line"></i></div><span class="nav__logo-text">Ergo<span>Home</span></span></a><div class="nav__actions"><button class="theme-toggle" aria-label="Toggle dark mode"><i class="ri-sun-line icon-sun"></i><i class="ri-moon-line icon-moon"></i></button></div></div></nav>
<main class="error-page">
  <div style="max-width:560px">
    <div style="font-size:80px;margin-bottom:var(--sp-6)">🪑</div>
    <div class="error-number">404</div>
    <h1 style="font-size:clamp(1.5rem,4vw,2.5rem);margin-bottom:var(--sp-4)">This desk seems to be missing</h1>
    <p style="font-size:var(--text-lg);color:var(--text-secondary);line-height:var(--leading-relaxed);margin-bottom:var(--sp-10)">The page you're looking for has moved or no longer exists. Your ergonomic journey continues here.</p>
    <div style="display:flex;gap:var(--sp-4);justify-content:center;flex-wrap:wrap;margin-bottom:var(--sp-12)">
      <a href="../index.html" class="btn btn--primary btn--lg"><i class="ri-home-line"></i> Go Home</a>
      <a href="services.html" class="btn btn--ghost btn--lg"><i class="ri-service-line"></i> Services</a>
      <a href="contact.html"  class="btn btn--ghost btn--lg"><i class="ri-mail-line"></i> Contact</a>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-4)">
      <a href="about.html"   class="card" style="text-decoration:none;text-align:center;padding:var(--sp-5)"><i class="ri-information-line" style="font-size:24px;color:var(--brand-primary);margin-bottom:var(--sp-2)"></i><div style="font-size:var(--text-sm);font-weight:600">About</div></a>
      <a href="blog.html"    class="card" style="text-decoration:none;text-align:center;padding:var(--sp-5)"><i class="ri-article-line" style="font-size:24px;color:var(--brand-primary);margin-bottom:var(--sp-2)"></i><div style="font-size:var(--text-sm);font-weight:600">Blog</div></a>
      <a href="booking.html" class="card" style="text-decoration:none;text-align:center;padding:var(--sp-5)"><i class="ri-calendar-line" style="font-size:24px;color:var(--brand-primary);margin-bottom:var(--sp-2)"></i><div style="font-size:var(--text-sm);font-weight:600">Book a Call</div></a>
    </div>
  </div>
</main>
<script src="../assets/js/main.js"></script>
</body>
</html>
